<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FSD · Golf Cart</title>
    <link href="{{ url_for('static', filename='vendor/fonts/fonts.css') }}" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="compact-cams">
    <div id="scene-container"></div>

    <!-- Top status bar -->
    <header class="top-bar">
        <div class="top-left">
            <div class="brand">
                <div class="brand-mark">Caddy</div>
                <div class="brand-version">v1.0.0</div>
            </div>
        </div>
        <div class="top-center">
            <div class="autopilot-badge">
                <span class="ap-icon-wrap">
                    <img class="ap-icon" src="{{ url_for('static', filename='img/ps5-controller.png') }}" alt="" aria-hidden="true" />
                    <span class="status-dot" id="controller-dot" title="Controller"></span>
                </span>
                <span>Controller Mode</span>
            </div>
            <div class="hw-status" id="hw-status">
                <span class="hw-item" id="hw-motor" title="Motor / ODrive">
                    <span class="hw-dot"></span><span class="hw-label">Motor</span>
                </span>
                <span class="hw-item" id="hw-arduino" title="Arduino / Pedals">
                    <span class="hw-dot"></span><span class="hw-label">Arduino</span>
                </span>
            </div>
        </div>
        <div class="top-right">
            <div class="time" id="time">—</div>
            <div class="battery">
                <span class="battery-pct">87%</span>
                <div class="battery-icon"><div class="battery-fill"></div></div>
            </div>
        </div>
    </header>

    <!-- Center speed readout -->
    <div class="speed-cluster">
        <div class="speed-readout">
            <div class="speed-value" id="speed">24</div>
            <div class="speed-unit">MPH</div>
        </div>
        <div class="speed-limit">
            <div class="limit-sign">
                <div class="limit-label">SPEED<br/>LIMIT</div>
                <div class="limit-number">25</div>
            </div>
        </div>
    </div>
    <!-- (P R N D gear selector intentionally removed) -->

    <!-- Bottom info row (temporarily hidden)
    <footer class="bottom-bar">
        <div class="info-block">
            <div class="info-label">NEXT</div>
            <div class="info-value">Straight 0.3 mi</div>
        </div>
        <div class="info-block center">
            <div class="info-label">ROUTE</div>
            <div class="info-value">Campus Loop · 4 min</div>
        </div>
        <div class="info-block right">
            <div class="info-label">RANGE</div>
            <div class="info-value">142 mi</div>
        </div>
    </footer>
    -->


    <!-- Bottom-left HUD: steering wheel + gas/brake bar -->
    <div class="hud-bottom-left">
        <div class="steering-widget">
            <svg class="wheel-svg" viewBox="0 0 100 100" aria-hidden="true">
                <g id="wheel-rotate">
                    <circle cx="50" cy="50" r="40" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
                    <circle cx="50" cy="50" r="10.5" fill="none" stroke="currentColor" stroke-width="3"/>
                    <line x1="11" y1="50" x2="39" y2="50" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
                    <line x1="61" y1="50" x2="89" y2="50" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
                    <line x1="50" y1="61" x2="50" y2="89" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
                </g>
            </svg>
            <div class="steering-angle" id="steer-angle">0°</div>
        </div>
        <div class="pedal-stack" id="pedal-stack" aria-hidden="true"></div>
    </div>

    <!-- Left turn signal stack -->
    <div class="side-indicators left">
        <div class="indicator-dot"></div>
        <div class="indicator-dot"></div>
        <div class="indicator-dot"></div>
    </div>
    <div class="side-indicators right">
        <div class="indicator-dot"></div>
        <div class="indicator-dot"></div>
        <div class="indicator-dot"></div>
    </div>

    <!-- Autoware status + predicted angle readout -->
    <div class="autoware-hud" id="autoware-hud">
        <span class="aw-status-dot"></span>
        <span id="aw-status-text">IDLE</span>
        <span class="aw-angle" id="aw-angle">—</span>
        <span id="aw-fps">—</span>
    </div>

    <!-- 4x2 stream grid.
         Row 1: raw cameras (slugs match scripts/autoware_infer.py::SLUGS).
         Row 2: Autoware model outputs — lanes / depth / objects / seg —
                shown only while Autoware viz is publishing.
         Each <img> is fed by snapshot polling (see refreshTiles below):
         short-lived /cam/<slug>.jpg requests with a cache-busting param.
         We deliberately AVOID the MJPEG endpoint here because Firefox
         caps long-lived connections at 6 per host — 8 streams + /state
         polling would push some tiles into a queued state that freezes
         them once the persistent socket eventually drops. -->
    <div class="cam-grid" id="cam-grid">
        <!-- Row 1: cameras -->
        <div class="cam-tile" data-cam="front_wide">
            <img alt="" />
            <div class="cam-label">Front Wide</div>
            <div class="cam-badge">AUTOWARE</div>
        </div>
        <div class="cam-tile" data-cam="front_narrow">
            <img alt="" />
            <div class="cam-label">Front Narrow</div>
            <div class="cam-badge">AUTOWARE</div>
        </div>
        <div class="cam-tile" data-cam="left">
            <img alt="" />
            <div class="cam-label">Left</div>
            <div class="cam-badge">AUTOWARE</div>
        </div>
        <div class="cam-tile" data-cam="right">
            <img alt="" />
            <div class="cam-label">Right</div>
            <div class="cam-badge">AUTOWARE</div>
        </div>

        <!-- Row 2: model outputs. Hidden until Autoware viz is live. -->
        <div class="cam-tile viz-tile" data-cam="lanes">
            <img alt="" />
            <div class="cam-label">Lanes</div>
            <div class="cam-pending">model loading…</div>
        </div>
        <div class="cam-tile viz-tile" data-cam="depth">
            <img alt="" />
            <div class="cam-label">Depth</div>
            <div class="cam-pending">model loading…</div>
        </div>
        <div class="cam-tile viz-tile" data-cam="objects">
            <img alt="" />
            <div class="cam-label">Obstacles</div>
            <div class="cam-pending">model loading…</div>
        </div>
        <div class="cam-tile viz-tile" data-cam="seg">
            <img alt="" />
            <div class="cam-label">Segmentation</div>
            <div class="cam-pending">model loading…</div>
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "{{ url_for('static', filename='vendor/three/three.module.js') }}"
        }
    }
    </script>
    <script type="module" src="{{ url_for('static', filename='js/scene.js') }}"></script>
    <script>
        function tick() {
            const d = new Date();
            const h = d.getHours();
            const m = d.getMinutes().toString().padStart(2, '0');
            const hh = ((h + 11) % 12 + 1);
            const ap = h >= 12 ? 'PM' : 'AM';
            document.getElementById('time').textContent = `${hh}:${m} ${ap}`;
        }
        tick();
        setInterval(tick, 1000);

        const speedEl = document.getElementById('speed');
        const wheelEl = document.getElementById('wheel-rotate');
        const angleEl = document.getElementById('steer-angle');

        // Pedal stack: 10 gas dashes (top) + 10 brake dashes (bottom). Dashes
        // closest to the center light up first, extending outward as the
        // driver presses harder — the center stays quiet when idle.
        const PEDAL_COUNT = 10;
        const stackEl = document.getElementById('pedal-stack');
        const gasDashes = [];
        const brakeDashes = [];
        for (let i = 0; i < PEDAL_COUNT; i++) {
            const d = document.createElement('div');
            d.className = 'pedal-dash gas';
            stackEl.appendChild(d);
            gasDashes.push(d);  // index 0 = top (max gas)
        }
        for (let i = 0; i < PEDAL_COUNT; i++) {
            const d = document.createElement('div');
            d.className = 'pedal-dash brake';
            stackEl.appendChild(d);
            brakeDashes.push(d);  // index 0 = just below center, last = bottom
        }

        function updatePedalStack(gasFrac, brakeFrac) {
            const gasLit = Math.round(gasFrac * PEDAL_COUNT);
            const brakeLit = Math.round(brakeFrac * PEDAL_COUNT);
            const gasEdge = gasLit > 0 ? PEDAL_COUNT - gasLit : -1;
            const brakeEdge = brakeLit > 0 ? brakeLit - 1 : -1;
            for (let i = 0; i < PEDAL_COUNT; i++) {
                // gasDashes[0] is at the top = last to light up.
                gasDashes[i].classList.toggle('active', i >= PEDAL_COUNT - gasLit);
                gasDashes[i].classList.toggle('edge', i === gasEdge);
                // brakeDashes[0] is just below center = first to light up.
                brakeDashes[i].classList.toggle('active', i < brakeLit);
                brakeDashes[i].classList.toggle('edge', i === brakeEdge);
            }
        }

        const controllerDot = document.getElementById('controller-dot');
        const motorItem = document.getElementById('hw-motor');
        const arduinoItem = document.getElementById('hw-arduino');

        function setConnected(el, connected) {
            el.classList.toggle('connected', !!connected);
        }

        // Autoware HUD + camera tile indicator.
        const awHud = document.getElementById('autoware-hud');
        const awStatus = document.getElementById('aw-status-text');
        const awAngle = document.getElementById('aw-angle');
        const awFps = document.getElementById('aw-fps');
        const camTiles = {};
        const vizTiles = [];
        document.querySelectorAll('.cam-tile').forEach(el => {
            camTiles[el.dataset.cam] = el;
            if (el.classList.contains('viz-tile')) vizTiles.push(el);
        });

        // Snapshot polling.
        // Each <img> requests /cam/<slug>.jpg?t=<timestamp> on a fixed
        // interval. Short-lived HTTP exchanges only — no persistent MJPEG
        // sockets, so Firefox's per-host connection cap (6) doesn't choke
        // us with 8 simultaneous streams. The cache-buster on `t` keeps the
        // browser from serving a stale image from disk cache.
        // Refresh rate matches autoware_infer's JPEG publish cadence (~15
        // Hz) so we don't poll faster than new frames are produced.
        const FRAME_REFRESH_MS = 80;
        function refreshTiles() {
            const t = Date.now();
            for (const slug in camTiles) {
                const el = camTiles[slug];
                // Skip viz tiles that haven't been declared ready —
                // requesting a non-existent /cam/lanes.jpg returns 404 and
                // would just fill the console with noise.
                if (el.classList.contains('viz-tile')
                        && !el.classList.contains('viz-ready')) {
                    continue;
                }
                const img = el.querySelector('img');
                if (img) img.src = `/cam/${slug}.jpg?t=${t}`;
            }
        }
        refreshTiles();
        setInterval(refreshTiles, FRAME_REFRESH_MS);

        function updateAutoware(s) {
            const aw = s.autoware || {};
            const running = !!aw.running;
            // Precedence — ps5_drive's authoritative status wins when present,
            // else we infer from the running flag so the UI is still useful
            // when ps5_drive isn't launched with --autosteer.
            let status = (s.autosteer_status || (running ? 'autoware' : 'idle'));
            if (s.human_override) status = 'human';
            awHud.classList.remove(
                'status-idle', 'status-autoware', 'status-human', 'status-stale'
            );
            awHud.classList.add('status-' + status);
            awStatus.textContent = status.toUpperCase();

            // Camera tile sizing follows drive mode: full-size only while
            // Autoware is actively steering, compact in every other state
            // (idle / human override / stale) so the cards don't dominate
            // the screen during manual driving.
            document.body.classList.toggle(
                'compact-cams', status !== 'autoware'
            );

            // Angle shown is what Autoware currently predicts; when idle we
            // show an em dash because a stale 0° could be misread as "model
            // thinks we're centered" when really the model isn't running.
            if (running && aw.inference) {
                const d = Number(aw.steer_deg) || 0;
                awAngle.textContent = `${d >= 0 ? '+' : ''}${d.toFixed(0)}°`;
            } else {
                awAngle.textContent = '—';
            }
            awFps.textContent = aw.fps ? `${aw.fps.toFixed(0)} FPS` : '';

            // Highlight the active camera tile. Only one at a time; when the
            // inference is off, no tile is highlighted.
            const active = running && aw.inference ? aw.active_cam : null;
            for (const [slug, el] of Object.entries(camTiles)) {
                el.classList.toggle('active', slug === active);
            }
            // Viz tiles light up only once the sidecar starts publishing
            // model outputs (separate flag from inference because we have
            // a --no-viz mode that runs the steering model alone).
            const vizLive = !!aw.viz;
            for (const el of vizTiles) {
                el.classList.toggle('viz-ready', vizLive);
            }

            // Recolor the 3D predicted path. Gold the moment Autoware
            // actually owns the wheel (status === 'autoware'); blue the
            // instant the human pushes the stick past the deadzone or
            // when Autoware isn't running. 'stale' / 'idle' fall through
            // to blue too — gold is reserved for "the model is steering
            // right now."
            if (typeof window.__setPathTone === 'function') {
                window.__setPathTone(status === 'autoware' ? 'autoware' : 'human');
            }
        }

        async function pollState() {
            try {
                const r = await fetch('/state', { cache: 'no-store' });
                if (!r.ok) return;
                const s = await r.json();
                const mph = Number(s.mph) || 0;
                speedEl.textContent = Math.round(mph);
                // Published for scene.js's animate loop to slide the
                // lane markers down the road at an MPH-proportional rate.
                window.__mph = mph;

                const steerDeg = Number(s.steer_deg) || 0;
                wheelEl.style.transform = `rotate(${steerDeg}deg)`;
                angleEl.textContent = `${steerDeg >= 0 ? '+' : ''}${steerDeg.toFixed(0)}°`;
                // Published for scene.js to bend the predicted path. When
                // autoware is producing predictions, use the model's raw
                // argmax (no autoware-side EMA, no ps5_drive gain/sign,
                // no client-side smoothing) so the yellow strips track
                // the model output exactly. Falls back to the commanded
                // wheel angle in plain PS5 mode where autoware is off.
                const aw0 = s.autoware || {};
                if (aw0.running && aw0.inference) {
                    window.__steerDeg = Number(aw0.steer_deg_raw) || 0;
                } else {
                    window.__steerDeg = steerDeg;
                }

                updatePedalStack(
                    Math.max(0, Math.min(1, Number(s.gas_frac) || 0)),
                    Math.max(0, Math.min(1, Number(s.brake_frac) || 0)),
                );

                setConnected(controllerDot, s.controller_connected);
                setConnected(motorItem, s.motor_connected);
                setConnected(arduinoItem, s.arduino_connected);
                updateAutoware(s);
            } catch (e) {
                setConnected(controllerDot, false);
                setConnected(motorItem, false);
                setConnected(arduinoItem, false);
                updateAutoware({});
            }
        }
        pollState();
        setInterval(pollState, 80);
    </script>
</body>
</html>
